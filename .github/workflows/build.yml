name: Build packages

on:
  push:

jobs:
  npm:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ts

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Compile files
        run: npm run build
      - name: Test
        run: npm test

